# Reusable build+package workflow: builds NetVis Release on all three OSes and
# produces the platform installer (NSIS .exe on Windows, .pkg on macOS, .zip on
# Linux). Called by ci.yml (on a vX.Y.Z tag) and release.yml (manual override).
# Uploads each artifact so the caller can attach them to a GitHub Release.
name: package

on:
  workflow_call:
    inputs:
      version:
        description: "Version string X.Y.Z stamped into the package metadata"
        required: true
        type: string

jobs:
  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gen: ZIP
            ext: zip
            label: Linux-x86_64
          - os: macos-latest
            gen: productbuild
            ext: pkg
            label: macOS-arm64
          - os: windows-latest
            gen: NSIS
            ext: exe
            label: Windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      # Linux GUI build needs OpenGL + X11 dev headers for GLFW.
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev

      # NSIS provides makensis for the Windows installer generator.
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis --no-progress -y

      - name: Configure MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DNETVIS_VERSION=${{ inputs.version }}
          -DNETVIS_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        working-directory: build
        run: cpack -G ${{ matrix.gen }}

      # Collect the CPack output and rename it to a CANONICAL name. CPack's NSIS
      # generator ignores CPACK_PACKAGE_FILE_NAME and names the .exe using only
      # the major version (e.g. "NetVis-0-..."), so we rename by extension here
      # rather than trusting the generator's filename.
      - name: Collect artifact
        shell: bash
        working-directory: build
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          src=(NetVis-*.${{ matrix.ext }})
          if [ ${#src[@]} -ne 1 ]; then
            echo "::error::expected exactly one .${{ matrix.ext }}, found: ${src[*]:-none}"
            exit 1
          fi
          dest="NetVis-${{ inputs.version }}-${{ matrix.label }}.${{ matrix.ext }}"
          cp "${src[0]}" "dist/$dest"
          echo "Packaged: $dest"; ls -la dist

      # Validate the artifact so a broken/empty package FAILS the job instead of
      # being silently published. Guards against past bugs: an empty macOS .pkg
      # (missing bundle payload) and a mis-versioned filename.
      - name: Validate artifact
        shell: bash
        working-directory: build/dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(NetVis-*)
          if [ ${#files[@]} -eq 0 ]; then echo "no artifact produced"; exit 1; fi
          for f in "${files[@]}"; do
            size=$(wc -c < "$f")
            echo "artifact $f = $size bytes"
            # Every real installer is well over 100 KB; a tiny file means an
            # empty payload (e.g. a bundle that never got installed).
            if [ "$size" -lt 102400 ]; then
              echo "::error::artifact $f is only $size bytes — likely empty/broken"
              exit 1
            fi
            # The version must appear in the filename (catches the "-0-" bug).
            case "$f" in
              *"${{ inputs.version }}"*) ;;
              *) echo "::error::artifact $f is missing version ${{ inputs.version }}"; exit 1 ;;
            esac
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netvis-${{ runner.os }}
          path: build/dist/*
          if-no-files-found: error
